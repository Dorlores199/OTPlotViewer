name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-checks:
    name: Python checks
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile main script
        run: python -m py_compile kymograph_force_distance_ui.py

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          $scripts = @(
            "build_windows.ps1",
            "installer/install_otplotviewer.ps1",
            "installer/build_sfx_installer.ps1",
            "scripts/check_release_metadata.ps1",
            "scripts/package_windows_folder.ps1"
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $script), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count) {
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }
