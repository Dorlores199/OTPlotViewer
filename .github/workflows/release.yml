name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release, for example v1.0.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish Windows release
    runs-on: windows-latest

    steps:
      - name: Resolve tag
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must look like v1.2.3. Got: $tag"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$($tag.TrimStart('v'))" >> $env:GITHUB_OUTPUT

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Ensure 7-Zip
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\Program Files\7-Zip\7z.exe")) {
            choco install 7zip -y --no-progress
          }

      - name: Verify release metadata
        shell: pwsh
        run: ./scripts/check_release_metadata.ps1 -Tag "${{ steps.release.outputs.tag }}"

      - name: Build Windows distribution
        shell: pwsh
        run: ./build_windows.ps1 -PythonExe python

      - name: Package Windows folder distribution
        shell: pwsh
        run: ./scripts/package_windows_folder.ps1 -Tag "${{ steps.release.outputs.tag }}"

      - name: Build one-click installer
        shell: pwsh
        run: ./installer/build_sfx_installer.ps1 -Version "${{ steps.release.outputs.tag }}" -OutputDir ./release

      - name: Prepare source archive
        shell: pwsh
        run: |
          git archive --format=zip -o "./release/OTPlotViewer_source_${{ steps.release.outputs.tag }}.zip" HEAD

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: OTPlotViewer ${{ steps.release.outputs.tag }}
          body_path: docs/release_${{ steps.release.outputs.tag }}.md
          fail_on_unmatched_files: true
          files: |
            release/OTPlotViewer_Setup_${{ steps.release.outputs.version }}.exe
            release/OTPlotViewer_source_${{ steps.release.outputs.tag }}.zip
            release/OTPlotViewer_${{ steps.release.outputs.tag }}_windows_folder.zip
            release/OTPlotViewer_${{ steps.release.outputs.tag }}_windows_folder_split.7z.*
